version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - ENV=dev
      - TZ=America/Bogota
      - SUPABASE_REQUIRE_SERVICE_KEY=false
    env_file:
      - .env
    depends_on:
      - ai-service
      - redis

  backend-worker:
    build: ./backend
    command: ["dramatiq", "workers.tasks"]
    volumes:
      - ./backend:/app
    environment:
      - ENV=dev
      - TZ=America/Bogota
      - SUPABASE_REQUIRE_SERVICE_KEY=false
    env_file:
      - .env
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - TZ=America/Bogota

  ai-service:
    build: ./ai-service
    ports:
      - "8001:8001"
    volumes:
      - ./ai-service:/app
    env_file:
      - .env
    environment:
      - TZ=America/Bogota

  ollama:
    image: ollama/ollama:latest
    environment:
      - TZ=America/Bogota
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
